version: '3.8'

services:
  backend:
    build: .
    container_name: hybrid_rag_backend
    volumes:
      - ./:/app
    env_file:
      - .env
    environment:
      # ชี้ไปหา ChromaDB Container
      - CHROMA_SERVER_HOST=localhost
      - CHROMA_SERVER_PORT=8001
    network_mode: "host"
    restart: unless-stopped
    depends_on:
      - chromadb

  chromadb:
    image: chromadb/chroma:latest
    container_name: hybrid_rag_chromadb
    environment:
      # เปลี่ยน Port เป็น 8001 เพื่อไม่ให้ชนกับ Backend (8000)
      - CHROMA_SERVER_HOST=0.0.0.0
      - CHROMA_SERVER_PORT=8001
    volumes:
      - ./chroma_db:/chroma/chroma
    network_mode: "host"
    restart: unless-stopped
