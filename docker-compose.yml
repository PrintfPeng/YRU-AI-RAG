services:
  backend:
    build: .
    container_name: hybrid_rag_backend
    ports:
      - "8005:8005"
    volumes:
      - ./:/app
    env_file:
      - .env
    environment:
      # ชี้ไปหา ChromaDB Container ผ่าน service name (bridge network)
      - CHROMA_SERVER_HOST=hybrid_rag_chromadb
      - CHROMA_SERVER_PORT=8000
    networks:
      - rag_network
    restart: unless-stopped
    depends_on:
      - chromadb

  chromadb:
    image: chromadb/chroma:latest
    container_name: hybrid_rag_chromadb
    ports:
      - "8000:8000"
    volumes:
      - ./chroma_db:/chroma/chroma
    networks:
      - rag_network
    restart: unless-stopped

networks:
  rag_network:
    driver: bridge
