services:
  mysql:
    image: mysql:8.0
    container_name: rag_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: yruroot2024
      MYSQL_DATABASE: ai_sandbox_db_local
      MYSQL_USER: ai-sandbox
      MYSQL_PASSWORD: "@v6MHHiUwwbErdnV"
    ports:
      - "0.0.0.0:3307:3306"
    volumes:
      - ./mysql_data:/var/lib/mysql
    networks:
      - rag_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pyruroot2024"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build: .
    container_name: hybrid_rag_backend
    ports:
      - "0.0.0.0:8005:8005"
    volumes:
      - ./:/app
    env_file:
      - .env
    environment:
      - CHROMA_SERVER_HOST=hybrid_rag_chromadb
      - CHROMA_SERVER_PORT=8000
      - DB_HOST=rag_mysql
      - DB_PORT=3306
      - DB_NAME=ai_sandbox_db_local
      - DB_USER=ai-sandbox
      - DB_PASSWORD=@v6MHHiUwwbErdnV
    networks:
      - rag_network
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      chromadb:
        condition: service_started

  chromadb:
    image: chromadb/chroma:latest
    container_name: hybrid_rag_chromadb
    ports:
      - "0.0.0.0:8000:8000"
    volumes:
      - ./chroma_db:/chroma/chroma
    networks:
      - rag_network
    restart: unless-stopped

networks:
  rag_network:
    driver: bridge
